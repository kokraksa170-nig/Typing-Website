<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Typing Test</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #1e1e2f;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        width: 700px;
        background: #2b2b3c;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 0 15px rgba(0,0,0,.3);
    }

    h1 {
        text-align: center;
    }

    #text {
        font-size: 20px;
        line-height: 1.7;
        margin-bottom: 20px;
    }

    textarea {
        width: 100%;
        height: 120px;
        font-size: 18px;
        padding: 10px;
        border-radius: 8px;
        border: none;
        resize: none;
        outline: none;
    }

    .stats {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
        font-size: 18px;
    }

    button {
        margin-top: 20px;
        width: 100%;
        padding: 12px;
        background: #4CAF50;
        color: white;
        border: none;
        font-size: 18px;
        border-radius: 8px;
        cursor: pointer;
    }

    button:hover {
        background: #45a049;
    }
</style>
</head>
<body>

<div class="container">

<h1>Typing Test</h1>

<div id="text">
The quick brown fox jumps over the lazy dog. Practice typing every day to improve your speed and accuracy.
</div>

<textarea id="input" placeholder="Start typing here..."></textarea>

<div class="stats">
<div>WPM: <span id="wpm">0</span></div>
<div>Accuracy: <span id="accuracy">100</span>%</div>
</div>

<button onclick="restart()">Restart</button>

</div>

<script>

const text = document.getElementById("text").innerText;
const input = document.getElementById("input");

let startTime = null;

input.addEventListener("input", function(){

    if(startTime === null){
        startTime = new Date();
    }

    const typed = input.value;

    let correct = 0;

    for(let i=0;i<typed.length;i++){
        if(typed[i] === text[i]){
            correct++;
        }
    }

    let accuracy = typed.length
        ? Math.round((correct/typed.length)*100)
        : 100;

    document.getElementById("accuracy").innerText = accuracy;

    const elapsed = (new Date() - startTime)/1000/60;

    const words = typed.trim().split(/\s+/).filter(word=>word!="").length;

    let wpm = elapsed > 0
        ? Math.round(words/elapsed)
        : 0;

    document.getElementById("wpm").innerText = wpm;

    if(typed === text){
        alert("🎉 Great Job!\n\nWPM: " + wpm + "\nAccuracy: " + accuracy + "%");
    }

});

function restart(){
    input.value = "";
    startTime = null;
    document.getElementById("wpm").innerText = "0";
    document.getElementById("accuracy").innerText = "100";
    input.focus();
}

</script>

</body>
</html>
